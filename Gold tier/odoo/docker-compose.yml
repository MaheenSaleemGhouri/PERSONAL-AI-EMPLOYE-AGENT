version: "3.8"

# =============================================================================
# Odoo 19 Community + PostgreSQL — Docker Compose
# AI Employee Gold Tier — Self-hosted Accounting System
# =============================================================================
# Usage:
#   cd "Gold tier/odoo"
#   docker compose up -d
#   Open http://localhost:8069 in your browser
#   Default master password: odoo_master_2026
# =============================================================================

services:
  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16
    container_name: odoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo_db_pass_2026}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Odoo 19 Community ----------
  odoo:
    image: odoo:19
    container_name: odoo_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: ${ODOO_DB_PASSWORD:-odoo_db_pass_2026}
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling / live-chat
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  odoo_db_data:
    driver: local
  odoo_data:
    driver: local
  odoo_addons:
    driver: local
